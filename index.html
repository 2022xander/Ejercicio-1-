<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gráfico de barras dinámico</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        /* Contenedor del gráfico alto */
        .grafico {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px; /* alto*/
            width: 400px; /*ancho */
            gap: 20px;
            border: 2px solid black;
            margin: 20px auto; /* centrar cuadro /
        }

        /* Barras */
        .barra {
            width: 50px;
            background-color: steelblue;
            text-align: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Gráfico de barras dinámico</h2>
<h3>Alexander Marocho Huaman</h3>

<!-- CONTENEDOR -->
<div class="grafico" id="grafico">
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
</div>

<script>
    const barras = document.querySelectorAll(".barra");

    function actualizarGrafico() {
        barras.forEach(barra => {
            let valor = Math.floor(Math.random() * 91) + 10; // 10 - 100

            barra.style.height = valor * 2 + "px"; // altura proporcional
            barra.textContent = valor; // mostrar número
        });
    }

    // Ejecutar cada segundo
    setInterval(actualizarGrafico, 1000);

    // Primera carga
    actualizarGrafico();
</script>

</body>
</html>
